<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miolo comunicação gráfica</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@300&family=Nunito:wght@600&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="evento-descript">
        <div id="insercao">
            <h2>miolo</h2>
            <p id="sobre-evento">
                Da criação à impressão: tudo para comunicar sua marca com excelência.
            </p>
            <p id="localizacao">
                Sig/Sul quadra 03 bloco C loja 46
            </p>
        </div>
        <div id="descricao-formulario">
            Preencha o formulario abaixo para solicitar um orçamento ou tirar dúvidas sobre nossos serviços. Estamos aqui para ajudar a transformar suas ideias em realidade!
            <form action="">
                <div class="form-group">
                    <label for="name">Nome</label>
                    <input type="text" 
                    name="name" 
                    laceholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" 
                    name="email" 
                    placeholder="Digite seu email">
                </div>
                <div class="form-group">
                    <label for="phone">Telefone</label>
                    <input type="tel" 
                    name="phone" 
                    placeholder="Digite seu número de Whatsapp">
                </div>
                <div class="form-group">
                    <label for="interesse">Principal interesse</label>
                    <select name="interesse">
                    <option value="" disabled selected>Selecione</option>
                    <option value="cartoes">Cartões de visita</option>
                    <option value="flyers">Flyers</option>
                    <option value="banners">Banners</option>
                    <option value="adesivos">Adesivos</option>
                    <option value="outros">Outros</option>
                    </select>
                    <input type="submit" class="btn" value="Entrar em contato!">
                </div>
            </form>
        </div>
    </header>

</body>

</html>
